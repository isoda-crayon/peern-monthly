<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>療育レポート 2026年6月分｜にじいろくれよん</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --mint:#d8f3ea; --mint-d:#5bc4a4;
    --pink:#ffe1ec; --pink-d:#f48fb1;
    --lav:#e8e3fb; --lav-d:#a99adf;
    --cream:#fff6e4; --cream-d:#f4c869;
    --sky:#dcefff; --sky-d:#67c1ec;
    --ink:#54514c; --soft:#fbf7f1; --line:#efe7df;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; color:var(--ink); line-height:1.95;
    font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif;
    background:
      radial-gradient(circle at 10% 6%, #ffe9f1 0 16%, transparent 16%),
      radial-gradient(circle at 92% 10%, #def0ff 0 14%, transparent 14%),
      radial-gradient(circle at 88% 94%, #fff2d6 0 18%, transparent 18%),
      radial-gradient(circle at 6% 92%, #e2f7ee 0 16%, transparent 16%),
      #fffaf4;
    background-attachment:fixed;
  }
  .wrap{max-width:840px; margin:0 auto; padding:18px 14px 90px;}

  /* brand switch */
  .brandbar{display:flex; gap:10px; margin:4px 0 14px;}
  .brandbar a{flex:1; text-align:center; text-decoration:none;
    font-family:"Mochiy Pop One",sans-serif; font-size:15px; padding:13px 8px;
    border-radius:16px 16px 0 0; border:2px solid var(--line); border-bottom:none;
    color:#b3aaa0; background:#f4eee6; transition:.15s;}
  .brandbar a small{display:block; font-size:10px; letter-spacing:1px; margin-top:2px; font-family:"Zen Maru Gothic",sans-serif;}
  .brandbar a.active-ato{color:#b34a6c; background:#fff;
    border-color:var(--pink-d); box-shadow:0 -3px 0 var(--pink-d) inset;}
  .brandbar a.active-nij{color:#6552a8; background:#fff;
    border-color:var(--lav-d); box-shadow:0 -3px 0 var(--lav-d) inset;
    background:linear-gradient(90deg,#ffe1ec,#fff4d6,#e2f7ee,#dcefff,#e8e3fb);}

  .maintitle{font-family:"Mochiy Pop One",sans-serif; color:var(--pink-d);
    font-size:30px; text-align:center; margin:8px 0 18px; letter-spacing:2px;
    text-shadow:0 2px 0 #fff, 0 3px 6px rgba(244,143,177,.25);}

  .notice{background:#fff; border:2px dashed var(--sky-d); border-radius:20px;
    padding:22px 22px; margin:14px 0; text-align:center; color:#5a6b73; font-size:15px; line-height:2.1;}
  .notice .nicon{font-size:30px; display:block; margin-bottom:6px;}
  .notice strong{color:var(--pink-d);}
  .sample{margin-top:18px;}
  .sample-label{display:inline-block; font-family:"Mochiy Pop One",sans-serif;
    font-size:13px; color:#7a9aa6; background:var(--sky); border-radius:999px;
    padding:5px 16px; margin-bottom:12px;}
  .sample img{display:block; width:100%; max-width:420px; margin:0 auto;
    border-radius:18px; filter:drop-shadow(0 8px 16px rgba(150,140,160,.25));
    transform:rotate(-1deg);}

  .banner{display:block; width:100%; margin:10px 0 8px;
    filter:drop-shadow(0 9px 14px rgba(150,130,170,.22)); transform:rotate(-1deg);}
  .sec-banner{display:block; width:100%; max-width:520px; margin:36px auto 16px;
    filter:drop-shadow(0 7px 12px rgba(150,150,170,.2));}
  .sec-banner.tl{transform:rotate(-1.6deg);}
  .sec-banner.tr{transform:rotate(1.6deg);}

  .fb{border-radius:20px; text-align:center; font-family:"Mochiy Pop One",sans-serif;
    color:#fff; letter-spacing:2px; position:relative; overflow:hidden;}
  .fb.top{margin:6px 0 4px; padding:30px 16px; font-size:34px;
    background:repeating-linear-gradient(135deg,#5bc4a4 0 22px,#67c1ec 22px 44px);
    text-shadow:0 2px 0 rgba(0,0,0,.12);}
  .fb.sec{max-width:520px; margin:36px auto 16px; padding:18px 16px; font-size:24px;
    text-shadow:0 2px 0 rgba(0,0,0,.12);}
  .fb.s1{background:linear-gradient(90deg,#67c1ec,#9ad8f3);}
  .fb.s2{background:linear-gradient(90deg,#5bc4a4,#9fe0cd);}
  .fb.s3{background:linear-gradient(90deg,#a99adf,#c9bff0);}
  .fb.s4{background:linear-gradient(90deg,#f48fb1,#ffc0d5);}

  .taskwrap{margin:14px 0;}
  .taskpage{margin:0 0 24px;}
  .taskpage img{display:block; width:100%; border-radius:20px;
    filter:drop-shadow(0 8px 16px rgba(150,140,160,.22));}
  .taskpage:nth-child(odd) img{transform:rotate(-0.8deg);}
  .taskpage:nth-child(even) img{transform:rotate(0.8deg);}

  .footer{text-align:center; margin-top:34px; font-size:13px; color:#bcb3a9;}
  .rb{height:12px; border-radius:999px; max-width:220px; margin:0 auto 12px;
    background:linear-gradient(90deg,var(--pink-d),var(--cream-d),var(--mint-d),var(--sky-d),var(--lav-d));}
</style>
</head>
<body>
<div class="wrap">

  <nav class="brandbar">
    <a href="index.html" class="">あとりえくれよん<small>ATELIER</small></a>
    <a href="nijiiro.html" class="active-nij">にじいろくれよん<small>NIJIIRO</small></a>
  </nav>

  <h1 class="maintitle">2026年6月分</h1>

  <img class="banner" src="images/banner_top.png" alt="療育"
       onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'fb top',textContent:'療育'}))" />

  <img class="sec-banner tl" src="images/sec1_schedule.png" alt="① スケジュール"
       onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'fb sec s1',textContent:'① スケジュール'}))" />

  <figure class="taskpage"><img src="images/schedule_main_nij.png" alt="2026年6月のメイン課題スケジュール" /></figure>

  <img class="sec-banner tr" src="images/sec2_record.png" alt="② 療育記録"
       onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'fb sec s2',textContent:'② 療育記録'}))" />

  <img class="sec-banner tl" src="images/sec3_goal.png" alt="③ 今月の目標、総括"
       onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'fb sec s3',textContent:'③ 今月の目標、総括'}))" />

  <section class="notice">
    <span class="nicon">📝</span>
    総括は、毎月の<strong>「月次レポート」</strong>として、7月分をご報告いたします。<br>
    <strong>8月15日ごろの正式版リリース</strong>でお伝えしますので、いましばらくお待ちください。その間は写真を今まで通り掲載していきます。
    <div class="sample">
      <span class="sample-label">▼ 月次レポート（見本）</span>
      <img src="images/getuji-report-card.png" alt="月次レポート見本" />
    </div>
  </section>

  <img class="sec-banner tr" src="images/sec4_task.png" alt="④ 課題内容"
       onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'fb sec s4',textContent:'④ 課題内容'}))" />

  <section class="taskwrap">
    <figure class="taskpage"><img src="images/nij_task1.png" alt="教科課題" /></figure>
    <figure class="taskpage"><img src="images/nij_task2.png" alt="瞑想課題" /></figure>
    <figure class="taskpage"><img src="images/nij_task3.png" alt="メイン課題①" /></figure>
    <figure class="taskpage"><img src="images/nij_task4.png" alt="メイン課題②" /></figure>
    <figure class="taskpage"><img src="images/nij_task5.png" alt="メイン課題③" /></figure>
    <figure class="taskpage"><img src="images/nij_task6.png" alt="メイン課題④" /></figure>
  </section>

  <footer class="footer">
    <div class="rb"></div>
    にじいろくれよん ｜ 療育レポート 2026年6月分
  </footer>

</div>
</body>
</html>
